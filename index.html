<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons (favicon_io export, served from public/) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Belfast Commando</title>
    <!-- Plausible analytics (self-hosted) -->
    <script defer data-domain="belfastsurvivor.com" src="https://plausible-analytics-ce-production-287f.up.railway.app/js/script.js"></script>
    <script type="module" src="/src/main.js"></script>
  </head>

  <body>
    <!-- Three.js renderer canvas mounts here -->
    <div id="app"></div>

    <!-- Floating amber labels projected over the safehouse interactables (HUB only). -->
    <div id="hub-labels"></div>

    <!-- World-anchored locators projected over menaced civilians + level tips (LEVEL only). -->
    <div id="victim-locators"></div>

    <!-- Directional markers over the last few remaining invaders (LEVEL only) so a
         straggler hidden in a building or corner can always be found. -->
    <div id="enemy-markers"></div>

    <!-- Level-start title card: sector name + objective, fades itself out (LEVEL only). -->
    <div id="title-card">
      <div class="tc-title"></div>
      <div class="tc-sub"></div>
    </div>

    <!-- Heads-up display -->
    <div id="hud">
      <div id="hud-damage"></div>

      <!-- top-left: score + combo -->
      <div class="hud-corner top-left">
        <div class="hud-label">SCORE</div>
        <div id="hud-score">0</div>
        <div id="hud-combo"></div>
      </div>

      <!-- top-right: level + timer + civilian life -->
      <div class="hud-corner top-right">
        <div id="hud-level">BELFAST · SECTOR 1</div>
        <div id="hud-timer">0:00.0</div>
        <div id="hud-objective">Breach to the exit gate</div>
        <div id="hud-opcode"></div>
        <div id="hud-civilians" class="hud-civilians">
          <div class="hud-label">CIVILIANS</div>
          <div class="hud-bar hud-bar-civilians"><div id="hud-civilians-fill"></div></div>
          <div id="hud-civilians-text"></div>
        </div>
      </div>

      <!-- center crosshair (crisp CSS ticks; green tactical style) -->
      <div id="crosshair">
        <span class="ch ch-t"></span>
        <span class="ch ch-b"></span>
        <span class="ch ch-l"></span>
        <span class="ch ch-r"></span>
        <span class="ch ch-dot"></span>
      </div>

      <!-- style callouts -->
      <div id="hud-callouts"></div>

      <!-- bottom-left: health + stamina -->
      <div class="hud-corner bottom-left">
        <div class="hud-bar"><div id="hud-health-fill"></div></div>
        <div id="hud-health-text">100 HP</div>
        <div class="hud-bar hud-bar-stamina" id="hud-stamina"><div id="hud-stamina-fill"></div></div>
      </div>

      <!-- bottom-right: ammo + weapon -->
      <div class="hud-corner bottom-right">
        <div id="hud-ammo">12 / 12</div>
        <div class="hud-label">WEAPON</div>
        <div id="hud-weapon">Sidearm</div>
      </div>
    </div>

    <!-- Menu / pause / result overlay -->
    <div id="overlay">
      <div id="overlay-card">
        <h1 id="overlay-title">BELFAST COMMANDO</h1>
        <div id="overlay-body"></div>
        <div id="overlay-actions"></div>
        <div id="overlay-hint">Click to deploy</div>
      </div>
    </div>
  </body>
</html>
