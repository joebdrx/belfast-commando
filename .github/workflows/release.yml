name: release

# Build the native Tauri desktop bundles on each OS and publish them to a GitHub
# Release (the main-menu "Download Desktop Version" button links at the assets).
# Trigger by pushing a version tag (e.g. v0.1.1) or running it manually
# (Actions tab -> release -> Run workflow). Builds Linux + macOS + Windows.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # universal (Intel + Apple Silicon) .dmg
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04       # .AppImage + .deb
            args: ''
          - platform: windows-latest     # .exe (NSIS) + .msi
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev librsvg2-dev libappindicator3-dev patchelf \
            libxdo-dev libssl-dev build-essential file

      - name: Install npm dependencies
        run: npm ci

      - name: Build + publish to a GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Belfast Commando ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'Native desktop builds — download the installer for your OS, or play in the browser.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
